name: Build Executables

on:
  push:
    branches: [ master ]        # change to your branch name if not 'main'
  workflow_dispatch:           # allows manual trigger

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install pygame pyinstaller PyPDF2

    - name: Build Windows EXE
      run: pyinstaller --onefile --collect-all dnd_code dnd.py

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/dnd.exe


  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install pygame PyPDF2 pyinstaller

    - name: Build Mac App
      run: pyinstaller --onefile --collect-all dnd_code dnd.py

    - name: Upload Mac artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-build
        path: dist/dnd.exe
